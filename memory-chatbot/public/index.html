<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f11;
      color: #e8e8ed;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 720px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #1e1e24;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 600;
      color: #e8e8ed;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }

    .memory-badge {
      font-size: 12px;
      color: #6b7280;
      background: #1a1a22;
      border: 1px solid #2a2a35;
      border-radius: 20px;
      padding: 3px 10px;
    }

    #clear-btn {
      font-size: 13px;
      font-weight: 500;
      color: #ef4444;
      background: none;
      border: 1px solid #2a1515;
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    #clear-btn:hover {
      background: #1f0f0f;
      border-color: #ef4444;
    }

    #chat-window {
      flex: 1;
      width: 100%;
      max-width: 720px;
      overflow-y: auto;
      padding: 24px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #4b5563;
      text-align: center;
      padding: 40px 0;
    }

    .empty-state .icon { font-size: 40px; }
    .empty-state p { font-size: 15px; line-height: 1.5; max-width: 280px; }

    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 88%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 11px 15px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user .bubble {
      background: #6366f1;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .assistant .bubble {
      background: #1a1a24;
      color: #e8e8ed;
      border-bottom-left-radius: 4px;
    }

    .meta {
      font-size: 11px;
      color: #4b5563;
      padding: 0 4px;
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 14px 16px;
      background: #1a1a24;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #6366f1;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    footer {
      width: 100%;
      max-width: 720px;
      padding: 12px 20px 20px;
    }

    #input-form {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #1a1a24;
      border: 1px solid #2a2a35;
      border-radius: 14px;
      padding: 10px 12px;
      transition: border-color 0.15s;
    }

    #input-form:focus-within { border-color: #6366f1; }

    #message-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e8e8ed;
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      min-height: 24px;
      max-height: 160px;
      overflow-y: auto;
      font-family: inherit;
    }

    #message-input::placeholder { color: #4b5563; }

    #send-btn {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: #6366f1;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }

    #send-btn:disabled { opacity: 0.4; cursor: default; }
    #send-btn:not(:disabled):hover { background: #4f46e5; }

    #send-btn svg { width: 16px; height: 16px; fill: #fff; }

    .hint { font-size: 12px; color: #374151; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🧠</div>
    Memory Chatbot
  </div>
  <span class="memory-badge" id="memory-badge">0 messages remembered</span>
  <button id="clear-btn" title="Erase all conversation history">Clear memory</button>
</header>

<div id="chat-window">
  <div class="empty-state" id="empty-state">
    <div class="icon">💬</div>
    <p>Start a conversation. Everything you discuss will be remembered across sessions.</p>
  </div>
</div>

<footer>
  <form id="input-form">
    <textarea
      id="message-input"
      placeholder="Say something…"
      rows="1"
      autocomplete="off"
      autofocus
    ></textarea>
    <button type="submit" id="send-btn" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </form>
  <p class="hint">Press Enter to send · Shift+Enter for new line</p>
</footer>

<script>
  const chatWindow = document.getElementById('chat-window');
  const emptyState = document.getElementById('empty-state');
  const form = document.getElementById('input-form');
  const input = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');
  const clearBtn = document.getElementById('clear-btn');
  const memoryBadge = document.getElementById('memory-badge');

  let isStreaming = false;

  // ── Helpers ──────────────────────────────────────────────────────────────

  function updateBadge(count) {
    memoryBadge.textContent = `${count} message${count !== 1 ? 's' : ''} remembered`;
  }

  function hideEmpty() {
    emptyState.style.display = 'none';
  }

  function showEmpty() {
    emptyState.style.display = '';
  }

  function scrollToBottom() {
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function formatTime(ts) {
    return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(role, text, timestamp) {
    hideEmpty();
    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = timestamp ? formatTime(timestamp) : formatTime(Date.now());

    wrap.appendChild(bubble);
    wrap.appendChild(meta);
    chatWindow.appendChild(wrap);
    scrollToBottom();
    return bubble;
  }

  function addTypingIndicator() {
    const wrap = document.createElement('div');
    wrap.className = 'message assistant';
    wrap.id = 'typing';
    wrap.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
    chatWindow.appendChild(wrap);
    scrollToBottom();
    return wrap;
  }

  // ── Load history on boot ─────────────────────────────────────────────────

  async function loadHistory() {
    try {
      const res = await fetch('/api/history');
      const messages = await res.json();
      if (messages.length > 0) {
        messages.forEach((m, i) => addMessage(m.role, m.content, null));
        updateBadge(messages.length);
      }
    } catch (e) {
      console.error('Failed to load history', e);
    }
  }

  // ── Send message ─────────────────────────────────────────────────────────

  async function sendMessage(text) {
    if (isStreaming) return;
    isStreaming = true;
    sendBtn.disabled = true;

    addMessage('user', text);

    const typing = addTypingIndicator();
    let assistantBubble = null;
    let fullText = '';

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Request failed');
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6);
          if (payload === '[DONE]') break;

          try {
            const { text: chunk, error } = JSON.parse(payload);
            if (error) throw new Error(error);

            if (!assistantBubble) {
              typing.remove();
              assistantBubble = addMessage('assistant', '').parentElement.querySelector('.bubble');
            }

            fullText += chunk;
            assistantBubble.textContent = fullText;
            scrollToBottom();
          } catch {}
        }
      }

      // Update memory badge (history now has +2: user + assistant)
      const histRes = await fetch('/api/history');
      const hist = await histRes.json();
      updateBadge(hist.length);

    } catch (err) {
      typing.remove();
      addMessage('assistant', `Error: ${err.message}`);
    } finally {
      isStreaming = false;
      sendBtn.disabled = input.value.trim().length === 0;
    }
  }

  // ── Clear memory ─────────────────────────────────────────────────────────

  clearBtn.addEventListener('click', async () => {
    if (!confirm('Erase all conversation memory? This cannot be undone.')) return;
    await fetch('/api/history', { method: 'DELETE' });
    chatWindow.querySelectorAll('.message').forEach(el => el.remove());
    showEmpty();
    updateBadge(0);
  });

  // ── Input auto-resize & submit ────────────────────────────────────────────

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = `${Math.min(input.scrollHeight, 160)}px`;
    sendBtn.disabled = input.value.trim().length === 0 || isStreaming;
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text || isStreaming) return;
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    sendMessage(text);
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.dispatchEvent(new Event('submit'));
    }
  });

  // ── Boot ─────────────────────────────────────────────────────────────────
  loadHistory();
</script>
</body>
</html>
