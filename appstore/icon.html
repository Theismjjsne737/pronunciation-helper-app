<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>Mimiq App Icon — 1024×1024</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 1024px;
    overflow: hidden;
    background: #000;
  }

  .icon {
    width: 1024px;
    height: 1024px;
    position: relative;
    overflow: hidden;
    background: #07050f;
  }

  .bg-gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 50% 30%, #1a0f3a 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 20% 80%, #0d0828 0%, transparent 60%),
      linear-gradient(160deg, #0f0a22 0%, #07050f 50%, #0a0618 100%);
  }

  .glow {
    position: absolute;
    width: 900px;
    height: 600px;
    left: 50%;
    top: 400px;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse at center, rgba(123,85,255,0.32) 0%, rgba(123,85,255,0.12) 50%, transparent 75%);
    filter: blur(60px);
  }

  .waveform {
    position: absolute;
    left: 50%;
    top: 400px;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    gap: 17px;
    height: 500px;
  }

  .bar {
    width: 30px;
    border-radius: 15px;
    background: linear-gradient(180deg, #e2daff 0%, #8b65ff 45%, rgba(123,85,255,0.40) 100%);
    box-shadow: 0 0 0 2px rgba(200,182,255,0.50);
    flex-shrink: 0;
  }

  .wordmark {
    position: absolute;
    left: 50%;
    bottom: 158px;
    transform: translateX(-50%);
    font-size: 136px;
    font-weight: 700;
    letter-spacing: -0.03em;
    white-space: nowrap;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    background: linear-gradient(135deg, #ffffff 0%, #c5b8ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    position: absolute;
    left: 50%;
    bottom: 96px;
    transform: translateX(-50%);
    font-size: 38px;
    font-weight: 400;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: rgba(197,184,255,0.52);
    white-space: nowrap;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }
</style>
</head>
<body>
<div class="icon">
  <div class="bg-gradient"></div>
  <div class="glow"></div>

  <!-- Voice waveform — asymmetric heights for organic feel -->
  <div class="waveform">
    <div class="bar" style="height:108px;opacity:0.42"></div>
    <div class="bar" style="height:183px;opacity:0.58"></div>
    <div class="bar" style="height:283px;opacity:0.70"></div>
    <div class="bar" style="height:217px;opacity:0.64"></div>
    <div class="bar" style="height:391px;opacity:0.88"></div>
    <div class="bar" style="height:458px"></div>
    <div class="bar" style="height:358px;opacity:0.90"></div>
    <div class="bar" style="height:433px;opacity:0.96"></div>
    <div class="bar" style="height:500px"></div>
    <div class="bar" style="height:408px;opacity:0.92"></div>
    <div class="bar" style="height:467px;opacity:0.98"></div>
    <div class="bar" style="height:383px;opacity:0.88"></div>
    <div class="bar" style="height:317px;opacity:0.78"></div>
    <div class="bar" style="height:233px;opacity:0.67"></div>
    <div class="bar" style="height:158px;opacity:0.54"></div>
    <div class="bar" style="height:100px;opacity:0.40"></div>
  </div>

  <div class="wordmark">Mimiq</div>
  <div class="tagline">Pronunciation Coach</div>
</div>
</body>
</html>
